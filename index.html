      .animate-fade-in {
        animation: fadeIn 0.5s ease-out;
      }
      
      .animate-fade-in-up {
        animation: fadeInUp 0.4s ease-out;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
